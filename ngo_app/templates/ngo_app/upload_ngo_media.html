{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <h2 class="fw-bold mb-4">Upload NGO Media</h2>
    
    <div class="p-4 bg-light-custom rounded shadow-sm">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3">Upload</button>
        </form>
    </div>
</div>
{% endblock %}
