{% extends 'base.html' %}
{% block title %}Verify Pickup | ECO-FEED{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-lg p-4">
      <h3 class="text-success fw-bold mb-3">Verify Pickup</h3>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Donation ID</label>
          <input type="text" name="donation_id" class="form-control" placeholder="Enter Donation ID" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Verify</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
