{% extends 'base.html' %}

{% block title %}Register | ECO-FEED{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg mb-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-success"></i>
                    <h2 class="fw-bold mt-2">Join ECO-FEED</h2>
                    <p class="text-muted">Create an account to start helping</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">I am a:</label>
                        <select name="role" class="form-select" required>
                            <option value="donor">Donor (Restaurant/Individual)</option>
                            <option value="ngo">NGO (Charity/Food Bank)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input
                        type="tel"
                        name="phone"
                        class="form-control"
                        placeholder="+911234567890"
                        required
    >
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Address</label>
                        <textarea
                        name="address"
                        class="form-control"
                        rows="3"
                        placeholder="Enter your full address"
                        required
                        ></textarea>
                    </div>


                    <button type="submit" class="btn btn-success w-100 py-2">Create Account</button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted">Already have an account? <a href="{% url 'login' %}" class="text-success fw-bold">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
