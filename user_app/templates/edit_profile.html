{% extends 'base.html' %}

{% block title %}Edit Profile | ECO-FEED{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg mb-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-edit fa-3x text-success"></i>
                    <h2 class="fw-bold mt-2">Edit Your Profile</h2>
                    <p class="text-muted">Update your account information</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" 
                                   value="{{ profile.user.username }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" 
                                   value="{{ profile.user.email }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">I am a:</label>
                        <input type="text" class="form-control" 
                               value="{{ profile.role|title }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" 
                               value="{{ profile.phone }}" placeholder="+911234567890">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Address</label>
                        <textarea name="address" class="form-control" rows="3" 
                                  placeholder="Enter your full address">{{ profile.address }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2">Save Changes</button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
