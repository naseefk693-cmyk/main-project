{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm">
            <h3 class="mb-3 text-success">List Surplus Food</h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Food Type</label>
                    <input type="text" name="food_type" class="form-control" placeholder="e.g. Cooked Rice, Sandwiches" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="text" name="quantity" class="form-control" placeholder="e.g. 5kg or 20 Plates" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Expiry Date & Time</label>
                    <input type="datetime-local" name="expiry_time" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Food Image</label>
                    <input type="file" name="image" class="form-control">
                </div>
                <button type="submit" class="btn btn-success w-100">Post Donation</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
